# Basic Buildroot Guide for v86 Emulator

This guide outlines the core steps to build a simple, lightweight Linux image using Buildroot that is fully compatible with the 32-bit [v86](https://github.com/copy/v86) browser emulator. It synthesizes the essential environment setups, architecture choices, and kernel configurations required for a stable v86 VM.

## Step 1: Environment Setup

Start on an Ubuntu build machine (can be a local VM or WSL). You'll need essential build tools to compile the toolchain and kernel.

```bash
# 1. Install prerequisites
sudo apt update
sudo apt install -y build-essential wget cpio unzip rsync bc libncurses5-dev python3 libssl-dev git

# 2. Download Buildroot (using an LTS version as an example)
cd ~
wget https://buildroot.org/downloads/buildroot-2024.02.2.tar.gz
tar -xvf buildroot-2024.02.2.tar.gz
cd buildroot-2024.02.2
```

## Step 2: Configure Buildroot

We will start with a default PC configuration and then adapt it to a lightweight 32-bit environment suitable for v86.

```bash
# Start with a generic PC config
make pc_x86_64_bios_defconfig

# Open the configuration menu
make menuconfig
```

In the `menuconfig` interface, apply the following critical settings:

1. **Target options** (Crucial for v86 compatibility):
   - **Target Architecture**: `i386`
   - **Target Architecture Variant**: `pentiumpro` (v86 supports the i686 instruction set well).

2. **System configuration**:
   - Set **System hostname** and **System banner** to your liking.
   - **Run a getty (login prompt) after boot**: Set *TTY port* to `tty1` (maps to the VGA screen) or `ttyS0` (maps to serial). You can configure a dual console later if needed.

3. **Filesystem images**:
   - Select `cpio the root filesystem (for use as an initial RAM filesystem)`
   - Set **Compression method** to `gzip`.
   - **Deselect** `ext2/3/4 root filesystem` (We don't need a persistent disk image; `cpio.gz` loaded directly into RAM is perfect and fast for v86).

*Save and Exit menuconfig.*

## Step 3: Configure the Linux Kernel

We must ensure the kernel has built-in drivers for devices emulated by v86, such as networking (e1000), serial consoles, and framebuffer graphics. They must be built-in (`*`), not modules (`M`).

```bash
# Open kernel configuration
make linux-menuconfig
```

In `linux-menuconfig`, press `/` to search and verify these are set to `*` (Press `y` to select as built-in):

1. **E1000 Network Driver**: `CONFIG_E1000=y`
   *(Device Drivers -> Network device support -> Ethernet driver support -> Intel devices -> Intel(R) PRO/1000 Gigabit Ethernet support)*
2. **Packet Sockets** (Needed for advanced networking/packet analysis): `CONFIG_PACKET=y`
   *(Networking support -> Networking options -> Packet socket)*
3. **8250 Serial** (For serial console output): `CONFIG_SERIAL_8250=y` and `CONFIG_SERIAL_8250_CONSOLE=y`
   *(Device Drivers -> Character devices -> Serial drivers -> 8250/16550 and compatible serial support)*
4. **Framebuffer Console** (For VGA graphics support): `CONFIG_FB=y` and `CONFIG_FRAMEBUFFER_CONSOLE=y`
   *(Device Drivers -> Graphics support -> Frame buffer Devices AND Console display driver support)*

*Save and Exit linux-menuconfig.*

## Step 4: Build the Image

Compile the toolchain, kernel, and filesystem. This process can take 20-40 minutes depending on your CPU cores.

```bash
# If you previously built for 64-bit, ALWAYS run make clean first
make clean

# Build using all available cores
make -j$(nproc)
```

## Step 5: Extract Artifacts

Once the compilation succeeds, navigate to the output directory:

```bash
cd output/images/
```

You only need two files to boot your VM in v86:
1. `bzImage` (The Kernel)
2. `rootfs.cpio.gz` (The Filesystem / Initrd)

Copy these files to your web project folder (e.g., into an `images/` directory).

## Step 6: v86 Integration

In your web application's HTML/JS setup, instantiate the emulator. Here is a basic snippet demonstrating the proper parameters:

```html
<!-- Container for the VGA screen -->
<div id="screen_container">
    <div style="white-space: pre; font: 14px monospace;"></div>
    <canvas></canvas>
</div>

<script type="module">
    import { V86Starter } from "./v86.js"; // Adjust path to your v86 library

    window.emulator = new V86Starter({
        wasm_path: "v86.wasm",
        memory_size: 256 * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        bios: { url: "bios/seabios.bin" },
        vga_bios: { url: "bios/vgabios.bin" },
        bzimage: { url: "images/bzImage" },
        initrd: { url: "images/rootfs.cpio.gz" },
        
        // Critical boot parameters for v86 compatibility
        cmdline: "rw root=/dev/ram0 console=tty1 console=ttyS0,115200 init=/sbin/init net.ifnames=0 biosdevname=0 acpi=off noapic nolapic",
        autostart: true,
    });
&lt;/script&gt;
```

### Important Boot Parameters Explained:
- `console=tty1 console=ttyS0,115200`: Outputs logs to both the VGA screen and the serial console.
- `net.ifnames=0 biosdevname=0`: Prevents the kernel from renaming `eth0` to modern interfaces like `enp0s5`. Crucial for simple network scripts to work properly inside v86.
- `acpi=off noapic nolapic`: Disables certain hardware configurations that can cause instability or freezes in the v86 emulator environment.

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const markdown = document.getElementById('markdown-content').textContent;
            const contentDiv = document.getElementById('content');
            const tocList = document.getElementById('toc-list');

            // Initialize Lucide icons
            lucide.createIcons();

            // Render Markdown
            contentDiv.innerHTML = marked.parse(markdown);

            // Post-processing: Syntax Highlighting & TOC
            const headings = contentDiv.querySelectorAll('h1, h2');
            headings.forEach((heading, index) => {
                const id = heading.textContent.toLowerCase().replace(/[^\w]+/g, '-');
                heading.id = id;

                if (heading.tagName === 'H2') {
                    const li = document.createElement('a');
                    li.href = `#${id}`;
                    li.className = 'toc-item';
                    li.textContent = heading.textContent;
                    tocList.appendChild(li);
                }
            });

            // Highlight code blocks
            Prism.highlightAll();

            // Add Copy Buttons
            document.querySelectorAll('pre').forEach(block => {
                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerHTML = '<i data-lucide="copy" size="14"></i>';
                block.appendChild(button);

                button.addEventListener('click', () => {
                    const code = block.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerHTML = '<i data-lucide="check" size="14"></i>';
                        setTimeout(() => {
                            button.innerHTML = '<i data-lucide="copy" size="14"></i>';
                            lucide.createIcons();
                        }, 2000);
                        lucide.createIcons();
                    });
                });
            });

            // Active TOC handling
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.5
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.toc-item').forEach(item => {
                            item.classList.remove('active');
                            if (item.getAttribute('href') === `#${entry.target.id}`) {
                                item.classList.add('active');
                            }
                        });
                    }
                });
            }, observerOptions);

            headings.forEach(h => observer.observe(h));
            
            // Re-initialize icons for dynamic elements
            lucide.createIcons();
        });
    </script>
